spring.profiles.active=local
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

spring.datasource.url=jdbc:mysql://localhost:3307/repo
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.username=moviebot
spring.datasource.password=moviebot

query.datasource.url=${QUERY_DATASOURCE_URL:${spring.datasource.url}}
query.datasource.username=${QUERY_DATASOURCE_USERNAME:${spring.datasource.username}}
query.datasource.password=${QUERY_DATASOURCE_PASSWORD:${spring.datasource.password}}

llm.endpoint=http://localhost:11436/v1/chat/completions
llm.model=movie-sql-q4_k_m
llm.temperature=0.05
llm.max-tokens=300
llm.connect-timeout-ms=3000
llm.read-timeout-ms=60000

security.google.client-id=${GOOGLE_CLIENT_ID}
security.jwt.token.secret-key=${JWT_SECRET}
security.jwt.token.expiration=86400000

security.admin.username=${ADMIN_USERNAME:admin}
security.admin.password=${ADMIN_PASSWORD:admin}

# Comma-separated CORS allow-list. Defaults to the local frontend origins; override per
# environment via CORS_ALLOWED_ORIGINS.
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4201,http://localhost:4200}

query.timeout-ms=5000

startup.dependency-check.enabled=true
startup.dependency-check.timeout-ms=3000

springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

transliterate.enabled=true
transliterate.endpoint=https://inputtools.google.com/request
transliterate.connect-timeout-ms=3000
transliterate.read-timeout-ms=5000

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5p){grey} %clr[${PID}] %clr([%15.15t]){cyan} %clr([%-8.8X{correlationId}]){yellow} %clr([%-10.10X{layer}]){magenta} %clr(%-40.40logger{15}){blue} %clr(:){red} %clr(%m){faint}%n
spring.output.ansi.enabled=ALWAYS
logging.level.liquibase=WARN

tmdb.api.key=${TMDB_API_KEY:}
tmdb.api.token=${TMDB_API_TOKEN:}
tmdb.connect-timeout-ms=5000
tmdb.read-timeout-ms=15000

sync.default-start-date=01-01-1990
sync.thread-count=12
sync.retry-delay-ms=300000
sync.max-retry-attempts=3

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=moviebot
spring.rabbitmq.password=moviebot
spring.rabbitmq.listener.simple.auto-startup=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
